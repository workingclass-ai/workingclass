name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests · py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m "not e2e" --tb=short

  structure:
    name: Structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so check_translation_staleness.py can read git log
          # for each README.<lang>.md.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate skill + cases
        run: python evals/validate_structure.py --strict

      - name: Verify INDEX.md is up-to-date
        run: |
          python evals/build_index.py
          git diff --exit-code -- evals/cases/INDEX.md \
            || (echo "::error::INDEX.md is stale — run 'python evals/build_index.py' and commit the result." && exit 1)

      - name: Check README translations are in sync
        # Allow a 7-day grace period — a contributor can land a README change
        # and follow up with translations in a separate PR within a week.
        run: python tools/check_translation_staleness.py --max-age-days 7

      - name: Verify recording pipeline against stub baseline
        # Re-runs evals against the deterministic stub LLM and diffs against the
        # committed BASELINE-stub.json. This catches regressions in the runner /
        # schema / diff tool — NOT in skill content quality (which the stub
        # cannot judge). Real-LLM evals run separately via eval-record.yml.
        run: |
          chmod +x tests/fixtures/*.sh
          python evals/run_evals.py --auto \
            --llm-command tests/fixtures/stub_llm_pass.sh \
            --record /tmp/stub-fresh.json
          python evals/eval_diff.py \
            evals/runs/BASELINE-stub.json /tmp/stub-fresh.json \
            --quiet

  e2e:
    name: End-to-end (stub LLM)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Make stubs executable
        run: chmod +x tests/fixtures/*.sh

      - name: Run e2e tests
        run: pytest -m e2e --tb=short
